<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1 Speaking Coach - Analyse</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #fdf8fd;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<!-- NAV -->
<nav class="bg-black text-white p-4 flex justify-between">
<h1 class="font-bold">B1 Speaking Coach</h1>
</nav>

<!-- MAIN -->
<main class="flex-grow flex justify-center items-center p-6">
<div class="w-full max-w-4xl">

<!-- LOADING -->
<div id="status" class="text-center py-20">
<p class="text-xl">Analyse wird geladen...</p>
</div>

<!-- RESULT -->
<div id="result" class="hidden bg-white shadow-xl rounded-xl overflow-hidden">

<!-- HEADER -->
<div class="p-6 border-b">
<h2 id="name" class="text-3xl font-bold"></h2>
<p class="text-gray-500 mt-2">B1 Sprechen Analyse</p>
</div>

<!-- CONTENT -->
<div class="grid md:grid-cols-3">

<!-- LEFT -->
<div class="bg-gray-100 p-6 space-y-6">
<div>
<h3 class="font-bold text-sm uppercase text-gray-500">Thema</h3>
<p id="thema" class="mt-2"></p>
</div>

<div>
<h3 class="font-bold text-sm uppercase text-gray-500">Transkript</h3>
<p id="transcript" class="mt-2 whitespace-pre-line text-sm"></p>
</div>
</div>

<!-- RIGHT -->
<div class="md:col-span-2 p-6">
<h3 class="font-bold text-lg mb-4">KI Analyse und Feedback</h3>
<div id="feedback" class="space-y-4 text-gray-700"></div>
</div>

</div>
</div>

</div>
</main>

<script>

// ambil submission_id dari URL
const params = new URLSearchParams(window.location.search);
const submissionId = params.get("submission_id");

// 🔥 spreadsheet kamu
const sheetURL = "https://opensheet.elk.sh/1eySp7IbkG81LEMUpA7OJrE6JnggrmL7MkPfrw4Gs02s/Sheet1";

async function fetchResults(){

const status = document.getElementById("status");

try{

const data = await fetch(sheetURL).then(r=>r.json());

// cari berdasarkan Submission ID
const result = data.find(
row => String(row["Submission ID"]) === String(submissionId)
);

if(result){

// NAME
document.getElementById("name").innerText =
result["Name"] || "";

// THEMA
document.getElementById("thema").innerText =
result["Situation wählen"] || "";

// TRANSKRIP
document.getElementById("transcript").innerText =
result["Typen Sie Ihre Diskusion/Planung/Dialog (Transkripte) Hier"] || "";

// FEEDBACK
const feedbackText =
result["KI Analyse und Feedback"] || "";

const formattedFeedback =
feedbackText
.split("\n")
.map(p => `<p>${p}</p>`)
.join("");

document.getElementById("feedback").innerHTML = formattedFeedback;

// tampilkan hasil
setTimeout(() => {
document.getElementById("status").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
},800);

}else{

status.innerHTML = `
<p>Data belum tersedia... mencoba lagi</p>
`;

setTimeout(fetchResults,4000);

}

}catch(e){

status.innerHTML = `
<p class="text-red-500">Error loading data</p>
`;

}

}

fetchResults();

</script>

</body>
</html>
