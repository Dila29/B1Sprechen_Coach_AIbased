<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1 Speaking Coach - Analyse</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #fdf8fd;
}
.shimmer {
    background: linear-gradient(90deg, #f7f2f8 25%, #e5e1e7 50%, #f7f2f8 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
}
@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
</style>

</head>

<body class="min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-3xl">

<!-- Loading -->
<div id="status" class="text-center py-20">
    <h2 class="text-xl font-bold">Analyse wird geladen...</h2>
    <p class="text-gray-500 mt-2">Bitte warten Sie einige Sekunden</p>
</div>

<!-- Result -->
<div id="result" class="hidden space-y-6">

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Name</h2>
        <p id="name"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Situation</h2>
        <p id="thema"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Transkript</h2>
        <p id="transkript"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">KI Analyse & Feedback</h2>
        <div id="feedback"></div>
    </div>

</div>

</div>
</main>

<script>

// ✅ ambil ID dari URL (?id=...)
const params = new URLSearchParams(window.location.search);
const submissionId = params.get("id");

// ✅ ambil data dari Google Sheets (opensheet)
const sheetURL = "https://opensheet.elk.sh/1Q_19DamqDI5sTmJwNZreqIapyiIL-LpYdlaR2tLPUUI/Sheet1";

async function fetchResults(){

    const status = document.getElementById("status");

    if(!submissionId){
        status.innerHTML = "ID tidak ditemukan di URL.";
        return;
    }

    try{

        const data = await fetch(sheetURL).then(r => r.json());

const result = data.find(
    row => String(row["Submission ID"]).replace(/\\D/g,'') === String(submissionId).replace(/\\D/g,'')
);

        if(result){

            document.getElementById("name").innerText = result["Name"] || "";

            document.getElementById("thema").innerText =
                result["Situatin wählen"] || "";

            document.getElementById("transkript").innerText =
                result["Transkripte"] || "";

            const feedbackText = result["KI Analyse und Feedback"] || "";

            const formattedFeedback =
                feedbackText.split("\n")
                .map(p => `<p class="mb-2">${p}</p>`)
                .join("");

            document.getElementById("feedback").innerHTML = formattedFeedback;

            document.getElementById("status").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");

        } else {

            // ⏳ kalau data belum masuk → retry
            status.innerHTML = "Analyse läuft noch... bitte warten.";

            setTimeout(fetchResults, 4000);
        }

    } catch (error){
        status.innerHTML = "Fehler beim Laden der Daten.";
        console.error(error);
    }
}

fetchResults();

</script>

</body>
</html>
