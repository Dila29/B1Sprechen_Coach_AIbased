<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1 Speaking Coach - Analyse</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #fdf8fd, #f3e8ff);
}
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #9333ea;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-3xl">

<!-- Loading Fancy -->
<div id="status" class="text-center py-20">

    <div class="loader"></div>

    <h2 id="loadingText" class="text-xl font-bold mb-3">
        Ihre Analyse wird vorbereitet
    </h2>

    <p class="text-gray-600 mb-3">
        Ihre Antwort wird gerade von unserer KI analysiert.
    </p>

    <p class="text-gray-500 mb-2">⏳ Dies kann bis zu 5 Minuten dauern.</p>
    <p class="text-gray-500 mb-2">📧 Das Ergebnis erhalten Sie auch per E-Mail.</p>

    <div class="mt-6 text-sm text-gray-400">
        💡 Tipp: Versuchen Sie jeden Tag laut Deutsch zu sprechen – auch nur 5 Minuten!
    </div>

</div>

<!-- Result -->
<div id="result" class="hidden space-y-6">

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Name</h2>
        <p id="name"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Situation</h2>
        <p id="situation"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Transkript</h2>
        <p id="transkript"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">KI Analyse & Feedback</h2>
        <div id="feedback"></div>
    </div>

</div>

</div>
</main>

<script>

// animasi titik-titik
let dots = 0;
setInterval(() => {
  const el = document.getElementById("loadingText");
  if(el){
    dots = (dots + 1) % 4;
    el.innerText = "Ihre Analyse wird vorbereitet" + ".".repeat(dots);
  }
}, 500);

// ambil ID dari URL
const params = new URLSearchParams(window.location.search);
const submissionId = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1SfKI2AxF3ZqVTvok7CPM-VctgLh3AuB28tKc0Tpdq5k/Sheet1";

async function fetchResults(){

    const status = document.getElementById("status");

    if(!submissionId){
        status.innerHTML = "ID tidak ditemukan di URL.";
        return;
    }

    try{

        const data = await fetch(sheetURL).then(r => r.json());

        const result = data.find(row => {
            const sheetId = String(row["Submission ID"] || "").replace(/\s/g, "");
            const urlId = String(submissionId || "").replace(/\s/g, "");
            return sheetId === urlId;
        });

        if(result && result["KI Analyse dan Feedback"] !== ""){

            document.getElementById("name").innerText = result["Name"] || "";

            document.getElementById("situation").innerText =
                result["Situatin wählen"] || "";

            document.getElementById("transkript").innerText =
                result["Transkripte"] || "";

            const feedbackText = result["KI Analyse und Feedback"] || "";

            const formattedFeedback =
                feedbackText.split("\n")
                .map(p => `<p class="mb-2">${p}</p>`)
                .join("");

            document.getElementById("feedback").innerHTML = formattedFeedback;

            document.getElementById("status").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");

        } else {

            setTimeout(fetchResults, 4000);
        }

    } catch (error){
        status.innerHTML = "Fehler beim Laden der Daten.";
        console.error(error);
    }
}

fetchResults();

</script>

</body>
</html>
