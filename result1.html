<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1 Speaking Coach - Analyse</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: sans-serif;
    background-color: #fdf8fd;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-3xl">

<!-- Loading -->
<div id="status" class="text-center py-20">
    <h2 class="text-xl font-bold">Analyse wird geladen...</h2>
    <p class="text-gray-500 mt-2">Bitte warten Sie einige Sekunden</p>
</div>

<!-- Result -->
<div id="result" class="hidden space-y-6">

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Name</h2>
        <p id="name"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Situation</h2>
        <p id="situation"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">Transkript</h2>
        <p id="transkript"></p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold text-lg mb-2">KI Analyse & Feedback</h2>
        <div id="feedback"></div>
    </div>

</div>

</div>
</main>

<script>

// ambil ID dari URL
const params = new URLSearchParams(window.location.search);
const submissionId = params.get("id");

// ✅ URL SUDAH DIPERBAIKI
const sheetURL = "https://opensheet.elk.sh/1SfKI2AxF3ZqVTvok7CPM-VctgLh3AuB28tKc0Tpdq5k/Sheet1";

async function fetchResults(){

    const status = document.getElementById("status");

    if(!submissionId){
        status.innerHTML = "ID tidak ditemukan di URL.";
        return;
    }

    try{

        const data = await fetch(sheetURL).then(r => r.json());

        console.log("DATA:", data);

        const result = data.find(
            row => String(row["Submission ID"]).trim() === String(submissionId).trim()
        );

        if(result){

            document.getElementById("name").innerText = result["Name"] || "";

            document.getElementById("situation").innerText =
                result["Situatin wählen"] || "";

            document.getElementById("transkript").innerText =
                result["Transkripte"] || "";

            const feedbackText = result["KI Analyse und Feedback"] || "";

            const formattedFeedback =
                feedbackText.split("\n")
                .map(p => `<p class="mb-2">${p}</p>`)
                .join("");

            document.getElementById("feedback").innerHTML = formattedFeedback;

            document.getElementById("status").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");

        } else {

            status.innerHTML = "Analyse läuft noch... bitte warten.";

            setTimeout(fetchResults, 4000);
        }

    } catch (error){
        status.innerHTML = "Fehler beim Laden der Daten.";
        console.error(error);
    }
}

fetchResults();

</script>

</body>
</html>
