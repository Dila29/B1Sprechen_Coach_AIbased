<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B1 Speaking Coach - Analyse</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#af0000",
                "surface": "#fdf8fd",
                "on-primary": "#ffffff",
                "secondary-container": "#fdcc00",
                "on-secondary-container": "#6e5700",
              },
              fontFamily: {
                headline: ["Plus Jakarta Sans", "sans-serif"],
                body: ["Plus Jakarta Sans", "sans-serif"],
              },
              borderRadius: {lg: "2rem", xl: "3rem"}
            }
          }
        }
</script>

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #fdf8fd;
}
.glass-nav {
    background: rgba(28, 27, 31, 0.95);
    backdrop-filter: blur(20px);
}
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #af0000;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="glass-nav sticky top-0 z-50 px-6 py-4 border-b border-white/10">
<div class="max-w-6xl mx-auto flex items-center justify-between">

<div class="flex items-center gap-4">
<div class="bg-secondary-container p-2 rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container">school</span>
</div>
<div>
<h1 class="text-secondary-container font-bold text-xl">B1 Speaking Coach</h1>
<p class="text-white/60 text-xs">AI Feedback für Ihre Sprechen-Aufgaben</p>
</div>
</div>

<a href="index.html"
   class="bg-primary hover:opacity-90 text-on-primary px-6 py-2.5 rounded-full text-sm shadow-lg">
   Startseite
</a>

</div>
</nav>

<main class="flex-grow flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-[900px] space-y-8">

<!-- Loading -->
<div id="status" class="text-center py-20">

    <div class="loader"></div>

    <h2 id="loadingText" class="text-xl font-bold mb-3">
        Ihre Analyse wird vorbereitet
    </h2>

    <p class="text-gray-600 mb-3">
        Ihre Antwort wird gerade von unserer KI analysiert.
    </p>

    <p class="text-gray-500">⏳ Dies kann bis zu 5 Minuten dauern.</p>
    <p class="text-gray-500">📧 Ergebnis auch per E-Mail verfügbar.</p>

</div>

<!-- Result -->
<div id="result" class="hidden space-y-6">

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Name</h2>
        <p id="name"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Situation</h2>
        <p id="situation"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">Transkript</h2>
        <p id="transkript"></p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h2 class="font-bold text-lg mb-2">KI Analyse & Feedback</h2>
        <div id="feedback"></div>
    </div>

</div>

</div>
</main>

<script>

let dots = 0;
setInterval(() => {
  const el = document.getElementById("loadingText");
  if(el){
    dots = (dots + 1) % 4;
    el.innerText = "Ihre Analyse wird vorbereitet" + ".".repeat(dots);
  }
}, 500);

const params = new URLSearchParams(window.location.search);
const submissionId = params.get("id");

const sheetURL = "https://opensheet.elk.sh/1SfKI2AxF3ZqVTvok7CPM-VctgLh3AuB28tKc0Tpdq5k/Sheet1";

async function fetchResults(){

    const status = document.getElementById("status");

    if(!submissionId){
        status.innerHTML = "ID tidak ditemukan di URL.";
        return;
    }

    try{

        const data = await fetch(sheetURL).then(r => r.json());

        const result = data.find(row => {
            const sheetId = String(row["Submission ID"] || "").replace(/\s/g, "");
            const urlId = String(submissionId || "").replace(/\s/g, "");
            return sheetId === urlId;
        });

        if(result && result["KI Analyse und Feedback"] !== ""){

            document.getElementById("name").innerText = result["Name"] || "";
            document.getElementById("situation").innerText = result["Situatin wählen"] || "";
            document.getElementById("transkript").innerText = result["Transkripte"] || "";

            const feedbackText = result["KI Analyse und Feedback"] || "";

            const formattedFeedback = feedbackText
                .split("\n")
                .map(p => `<p class="mb-2">${p}</p>`)
                .join("");

            document.getElementById("feedback").innerHTML = formattedFeedback;

            document.getElementById("status").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");

        } else {
            setTimeout(fetchResults, 4000);
        }

    } catch (error){
        status.innerHTML = "Fehler beim Laden der Daten.";
        console.error(error);
    }
}

fetchResults();

</script>

</body>
</html>
